# Bugfix Agent v5 Configuration
#
# このファイルでエージェントの動作設定を管理します。
# 環境変数 BUGFIX_AGENT_CONFIG でパスを上書き可能。

[agent]
# 作業ディレクトリ（空文字の場合はリポジトリルートを自動検出）
workdir = ""

# 各ループの最大再試行回数（Circuit Breaker）
max_loop_count = 5

# ステート遷移間のスリープ時間（秒）- レートリミット対策
state_transition_delay = 1.0

# CLI 出力をリアルタイム表示するか
verbose = true

[tools]
# コンテキストファイル読み込みの最大文字数（Codex 向け）
context_max_chars = 4000

# 各ツールのタイムアウト（秒）- 0 で無制限
[tools.codex]
model = "gpt-5.1-codex-max"
sandbox = "workspace-write"
timeout = 900  # 15分

[tools.gemini]
model = "gemini-2.5-pro"
timeout = 900  # 15分

[tools.claude]
model = "opus"
permission_mode = "default"
timeout = 1800  # 30分（実装タスクは時間がかかる）

[logging]
# ログ出力先のベースディレクトリ
# ⚠️ 現状未実装: この設定値は読み込まれていません
# 実際の出力先は AgentContext のハードコード値 "test-artifacts/bugfix-agent" で固定
artifacts_base = "test-artifacts/bugfix-agent"

[github]
# Issue コメント投稿の最大リトライ回数
max_comment_retries = 2
# リトライ間隔（秒）
retry_delay = 1.0

[states.INIT]
agent = "claude"          # 使用するAIツール: "gemini" | "codex" | "claude"
model = "opus"
# model と timeout は指定がなければ tools.gemini から継承

[states.INVESTIGATE]
agent = "claude"
model = "opus"
timeout = 600             # このステートのみタイムアウトを上書き

[states.INVESTIGATE_REVIEW]
agent = "codex"
model = "gpt-5.2"   # このステートのみモデルを上書き
timeout = 300

[states.DETAIL_DESIGN]
agent = "claude"
model = "opus"            # 複雑な設計タスクにOpusを使用
timeout = 900

[states.DETAIL_DESIGN_REVIEW]
agent = "codex"
model = "gpt-5.2"   #

[states.IMPLEMENT]
agent = "claude"
model = "opus"
timeout = 1800            # 実装に30分

[states.IMPLEMENT_REVIEW]
agent = "codex"
model = "gpt-5.2"
timeout = 600

[states.PR_CREATE]
agent = "claude"
model = "sonnet"
