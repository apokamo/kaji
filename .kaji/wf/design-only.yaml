name: design-only
description: |
  設計完了（verify-design PASS）までのワークフロー。
  issue-create / issue-start は事前に手動実行済みであることが前提。
execution_policy: auto
requires_provider: any

cycles:
  design-review:
    entry: review-design
    loop: [fix-design, verify-design]
    max_iterations: 3
    on_exhaust: ABORT

steps:
  - id: design
    skill: issue-design
    agent: claude
    model: opus
    effort: medium
    on:
      PASS: review-design
      ABORT: end

  - id: review-design
    skill: issue-review-design
    agent: codex
    model: gpt-5.4
    effort: medium
    on:
      PASS: end
      RETRY: fix-design
      ABORT: end

  - id: fix-design
    skill: issue-fix-design
    agent: claude
    model: opus
    resume: design
    on:
      PASS: verify-design
      ABORT: end

  - id: verify-design
    skill: issue-verify-design
    agent: codex
    model: gpt-5.4
    effort: medium
    on:
      PASS: end
      RETRY: fix-design
      ABORT: end
