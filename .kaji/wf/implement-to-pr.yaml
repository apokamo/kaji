name: implement-to-pr
description: |
  実装から PR 作成までのワークフロー。
  設計完了（verify-design PASS）済みであることが前提。
  issue-create / issue-start は事前に手動実行済みであることが前提。
execution_policy: auto
requires_provider: github

cycles:
  code-review:
    entry: review-code
    loop: [fix-code, verify-code]
    max_iterations: 3
    on_exhaust: ABORT

steps:
  - id: implement
    skill: issue-implement
    agent: claude
    model: opus
    timeout: 3600
    on:
      PASS: review-code
      RETRY: implement
      ABORT: end

  - id: review-code
    skill: issue-review-code
    agent: codex
    model: gpt-5.4
    effort: medium
    on:
      PASS: final-check
      RETRY: fix-code
      ABORT: end

  - id: fix-code
    skill: issue-fix-code
    agent: claude
    model: opus
    timeout: 3600
    on:
      PASS: verify-code
      ABORT: end

  - id: verify-code
    skill: issue-verify-code
    agent: codex
    model: gpt-5.4
    effort: medium
    on:
      PASS: final-check
      RETRY: fix-code
      ABORT: end

  - id: final-check
    skill: i-dev-final-check
    agent: claude
    model: opus
    on:
      PASS: pr
      RETRY: final-check
      BACK: implement
      ABORT: end

  - id: pr
    skill: i-pr
    agent: claude
    model: sonnet
    on:
      PASS: end
      RETRY: pr
      ABORT: end
