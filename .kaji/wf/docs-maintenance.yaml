name: docs-maintenance
description: |
  provider=gitlab 用の docs-only 開発 workflow。
  type:docs Issue を gitlab provider 配下で完走させる。
  issue-create / issue-start は事前に手動実行済みであることが前提。
  最終 step は i-pr（PR 作成）。
execution_policy: auto
requires_provider: gitlab

cycles:
  doc-review:
    entry: doc-review
    loop: [doc-fix, doc-verify]
    max_iterations: 3
    on_exhaust: ABORT

steps:
  - id: doc-update
    skill: i-doc-update
    agent: claude
    model: opus
    effort: xhigh
    on:
      PASS: doc-review
      ABORT: end

  - id: doc-review
    skill: i-doc-review
    agent: codex
    model: gpt-5.5
    effort: high
    on:
      PASS: final-check
      RETRY: doc-fix
      ABORT: end

  - id: doc-fix
    skill: i-doc-fix
    agent: claude
    model: opus
    effort: medium
    inject_verdict: true
    resume: doc-update
    on:
      PASS: doc-verify
      ABORT: end

  - id: doc-verify
    skill: i-doc-verify
    agent: codex
    model: gpt-5.5
    effort: medium
    resume: doc-review
    on:
      PASS: final-check
      RETRY: doc-fix
      ABORT: end

  - id: final-check
    skill: i-doc-final-check
    agent: claude
    model: opus
    effort: medium
    on:
      PASS: pr
      RETRY: final-check
      BACK: doc-update
      ABORT: end

  - id: pr
    skill: i-pr
    agent: claude
    model: sonnet
    effort: medium
    on:
      PASS: end
      RETRY: pr
      ABORT: end
