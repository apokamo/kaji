name: release-please-lock

# Release PR に uv.lock を追従させる follow-up workflow (Issue #153)
#
# - Release-Please が pyproject.toml を更新した Release PR に対し、
#   `uv sync --locked` 失敗を検知したら `uv lock` を実行し、差分があれば
#   Release PR branch に追加 commit を push する。
# - trigger は `pull_request` の opened / synchronize / reopened を使い、
#   同一 Release PR が更新されるたびに lock を追従させる
#   (labeled だけだと初回しか発火しない)。
# - head_ref が `release-please--branches--` で始まる PR のみ対象
#   (本番 main 起点 / dry-run 用 branch 起点の両方を拾う前方一致条件に統一)。
# - checkout と push は GitHub App (RELEASE_PLEASE_APP_ID /
#   RELEASE_PLEASE_APP_PRIVATE_KEY) から発行した installation token を使用し、
#   push 後に Release PR 上の CI が再起動するようにする。

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: read

jobs:
  uv-lock-sync:
    if: startsWith(github.event.pull_request.head.ref, 'release-please--branches--')
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App installation token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASE_PLEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}

      - name: Get GitHub App bot user ID
        id: bot-user
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          USER_ID=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)
          echo "id=${USER_ID}" >> "$GITHUB_OUTPUT"

      - name: Checkout Release PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Verify lockfile matches pyproject.toml
        id: verify
        run: |
          if uv sync --locked --frozen; then
            echo "in_sync=true" >> "$GITHUB_OUTPUT"
          else
            echo "in_sync=false" >> "$GITHUB_OUTPUT"
          fi
        continue-on-error: true

      - name: Regenerate lockfile
        if: steps.verify.outputs.in_sync != 'true'
        run: uv lock

      - name: Commit and push updated lockfile
        if: steps.verify.outputs.in_sync != 'true'
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
          BOT_USER_ID: ${{ steps.bot-user.outputs.id }}
        run: |
          if git diff --quiet uv.lock; then
            echo "No lockfile changes after uv lock"
            exit 0
          fi
          BOT_SLUG="${APP_SLUG}[bot]"
          BOT_EMAIL="${BOT_USER_ID}+${BOT_SLUG}@users.noreply.github.com"
          git config user.name "${BOT_SLUG}"
          git config user.email "${BOT_EMAIL}"
          git add uv.lock
          git commit -m "chore: sync uv.lock with pyproject.toml"
          git push origin "HEAD:${HEAD_REF}"
