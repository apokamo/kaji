name: feature-with-postmerge
description: |
  Issue の設計から PR 作成、さらに post-merge 品質確認までを自動化する開発ワークフロー。
  feature-development.yaml に wait-merge / verify-main-green / post-merge-review /
  post-merge-close の 4 ステップを直列接続したもの。既存 feature-development.yaml は
  変更しない。
execution_policy: auto

cycles:
  design-review:
    entry: review-design
    loop: [fix-design, verify-design]
    max_iterations: 3
    on_exhaust: ABORT
  code-review:
    entry: review-code
    loop: [fix-code, verify-code]
    max_iterations: 3
    on_exhaust: ABORT

steps:
  - id: design
    skill: issue-design
    agent: claude
    model: opus
    effort: medium
    on:
      PASS: review-design
      ABORT: end

  - id: review-design
    skill: issue-review-design
    agent: codex
    model: gpt-5.5
    effort: medium
    on:
      PASS: implement
      RETRY: fix-design
      ABORT: end

  - id: fix-design
    skill: issue-fix-design
    agent: claude
    model: opus
    resume: design
    on:
      PASS: verify-design
      ABORT: end

  - id: verify-design
    skill: issue-verify-design
    agent: codex
    model: gpt-5.4
    effort: medium
    on:
      PASS: implement
      RETRY: fix-design
      ABORT: end

  - id: implement
    skill: issue-implement
    agent: claude
    model: opus
    on:
      PASS: review-code
      RETRY: implement
      BACK: design
      ABORT: end

  - id: review-code
    skill: issue-review-code
    agent: codex
    model: gpt-5.5
    effort: medium
    on:
      PASS: final-check
      RETRY: fix-code
      BACK: design
      ABORT: end

  - id: fix-code
    skill: issue-fix-code
    agent: claude
    model: opus
    inject_verdict: true
    on:
      PASS: verify-code
      ABORT: end

  - id: verify-code
    skill: issue-verify-code
    agent: codex
    model: gpt-5.4
    effort: medium
    on:
      PASS: final-check
      RETRY: fix-code
      ABORT: end

  - id: final-check
    skill: i-dev-final-check
    agent: claude
    model: opus
    on:
      PASS: pr
      RETRY: final-check
      BACK: implement
      ABORT: end

  - id: pr
    skill: i-pr
    agent: claude
    model: sonnet
    on:
      PASS: wait-merge
      RETRY: pr
      ABORT: end

  - id: wait-merge
    skill: wait-merge
    agent: claude
    model: sonnet
    on:
      PASS: verify-main-green
      RETRY: end
      ABORT: end

  - id: verify-main-green
    skill: verify-main-green
    agent: claude
    model: sonnet
    on:
      PASS: post-merge-review
      RETRY: verify-main-green
      ABORT: end

  - id: post-merge-review
    skill: post-merge-review
    agent: claude
    model: sonnet
    on:
      PASS: post-merge-close
      RETRY: end
      ABORT: end

  - id: post-merge-close
    skill: post-merge-close
    agent: claude
    model: sonnet
    on:
      PASS: end
      ABORT: end
