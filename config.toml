# ============================================================================
# dao config.toml
# ============================================================================
# Tool and workflow settings for dev-agent-orchestra.
#
# Tool settings priority: constructor arg > config.toml > hardcoded defaults
# (Environment variable override for tool settings is not yet implemented)

# ----------------------------------------------------------------------------
# Tool Settings
# ----------------------------------------------------------------------------
# Each tool section defines defaults for that tool.
# Constructor arguments always override these values.

[tools.claude]
model = "opus"
permission_mode = "default"
timeout = 1800

[tools.codex]
model = "gpt-5.1-codex-max"
sandbox = "workspace-write"
timeout = 900

[tools.gemini]
model = "gemini-2.5-pro"
timeout = 900

# ----------------------------------------------------------------------------
# State-based Settings (Phase 2)
# ----------------------------------------------------------------------------
# Override tool/model per workflow state. If model/timeout is omitted,
# values are inherited from [tools.{agent}] above.
#
# Usage:
#   from src.bugfix_agent.tool_factory import create_tool_for_state
#   tool = create_tool_for_state("INIT")  # Returns ClaudeTool with opus model

# [states.INIT]
# agent = "claude"
# model = "opus"

# [states.INVESTIGATE]
# agent = "claude"
# # Inherits model and timeout from [tools.claude]

# [states.INVESTIGATE_REVIEW]
# agent = "codex"
# model = "gpt-5.2"
# timeout = 300

# [states.DETAIL_DESIGN]
# agent = "claude"
# model = "opus"
# timeout = 900

# [states.DETAIL_DESIGN_REVIEW]
