name: feature-development-gitlab-fixture
description: |
  Test-only fixture workflow for the test_large_gitlab E2E suite.

  This workflow declares ``requires_provider: gitlab`` so that the
  provider-mismatch fail-fast in ``cli_main.py`` (workflow load → provider
  match check) is satisfied for ``provider.type='gitlab'`` runs. It is NOT
  a production builtin — production GitLab workflow is out of scope for
  the test-only Issue local-pc5090-10 (see design § 4 / § OUT).

  The step set is intentionally minimal (a single stub step) so that the
  runner ↔ provider boundary (provider config validation, prompt builder
  receiving a GitLab-typed IssueContext, agent invocation path) is
  exercised end-to-end without depending on a multi-step skill state
  machine. The test provisions a stub skill directory and a fake ``claude``
  CLI on PATH that emits a PASS verdict.
execution_policy: auto
requires_provider: gitlab

steps:
  - id: stub
    skill: test-stub
    agent: claude
    model: sonnet
    effort: low
    on:
      PASS: end
      RETRY: end
      ABORT: end
